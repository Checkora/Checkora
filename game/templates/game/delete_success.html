{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Deleted | Checkora</title>
    <link rel="stylesheet" href="{% static 'game/css/auth.css' %}?v=8" />
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}" />
  </head>
  <body>
    <div class="header">
        <div class="logo-container">
            <img src="{% static 'game/checkora_icon_only.png' %}" class="logo-icon-img" alt="Checkora">
            <span class="logo-text">Checkora</span>
        </div>
    </div>

    <div class="auth-card">
        <div class="success-icon">✓</div>
        
        <div class="success-text">
            <h2>Account Deleted</h2>
            <p>Your Checkora account and all associated data have been permanently deleted.<br>We're sorry to see you go! ♟️</p>
        </div>

        <a href="{% url 'landing' %}" class="btn btn-gold" style="text-align: center; display: block; text-decoration: none; line-height: 1.5;">
            Return to Home
        </a>
    </div>
  </body>
</html>
