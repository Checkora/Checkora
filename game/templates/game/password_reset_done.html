{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | Checkora</title>
    <link rel="stylesheet" href="{% static 'game/css/auth.css' %}">
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}">
</head>
<body>

    <div class="header">
        <h1>Checkora</h1>
        <p>Check your email</p>
    </div>

    <div class="auth-card">
        <p style="text-align:center; font-size: 0.9rem; color: #555;"> Didn't receive the email? Check your spam folder or <a href="{% url 'password_reset' %}">try again</a>. 
        </p> <!-- helps user experience by providing next steps if the email is not received -->

        <div class="auth-footer">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>

</body>
</html>
