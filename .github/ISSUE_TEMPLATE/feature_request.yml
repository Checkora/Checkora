name: "💡 Feature Request"
description: "Suggest a new idea or improvement for Checkora."
title: "[Feature]: "
labels: ["type/enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We are always looking to improve Checkora! Please fill out this form to propose new ideas.
  - type: textarea
    id: problem
    attributes:
      label: "Problem Description"
      description: "Is your feature request related to a problem? Please describe."
      placeholder: "I get frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "A clear and concise description of what you want to happen."
      placeholder: "I suggest adding..."
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: "Alternatives Considered"
      description: "Describe any alternative solutions or features you considered."
      placeholder: "We could instead..."
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: "Code of Conduct & Contribution Checklist"
      options:
        - label: "I have searched existing issues to ensure this feature hasn't been requested already."
          required: true
        - label: "I agree to follow this project's Code of Conduct."
          required: true
